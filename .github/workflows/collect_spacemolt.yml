name: SpaceMolt Daily Data Collection

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 01:00 UTC = 10:00 JST
  workflow_dispatch:        # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # report.json をコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect SpaceMolt data
        env:
          SPACEMOLT_USERNAME: Orion.Watch
          SPACEMOLT_PASSWORD: ${{ secrets.SPACEMOLT_PASSWORD }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "収集日: $DATE"
          node spacemolt/scripts/collect_spacemolt.mjs $DATE

      - name: Merge data into report.json
        run: |
          DATE=$(date -u +%Y-%m-%d)
          node spacemolt/scripts/merge_data.mjs $DATE

      - name: Commit report.json
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spacemolt/output/$DATE/
          git diff --cached --quiet && echo "変更なし" || \
            git commit -m "chore: SpaceMolt daily report $DATE [skip ci]"
          git push
